<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Time tracking dashboard</title>
  </head>
  <body>
    <main class="container">
      <section class="container-avatar">
        <header class="container-name">
          <img src="./images/image-jeremy.png" alt="avatar" />
          <div class="name">
            <h1>Report for</h1>
            <p>Jeremy <span>Robson</span></p>
          </div>
        </header>
        <nav class="container-option">
          <button>Daily</button>
          <button>Weekly</button>
          <button>Monthly</button>
        </nav>
      </section>

      <section class="container-work work">
        <div class="icon-work">
          <img src="./images/icon-work.svg" alt="" />
        </div>
        <header class="container-work-title">
          <div class="work-icon">
            <h2>Work</h2>
            <button class="button-icon">
              <img src="./images/icon-ellipsis.svg" alt="icon ellipsis" />
            </button>
          </div>
          <div class="work-hour">
            <h3>32hrs</h3>
            <p>Last week - 36hrs</p>
          </div>
        </header>
      </section>

      <section class="container-work play">
        <div class="icon-work">
          <img src="./images/icon-play.svg" alt="" />
        </div>
        <header class="container-work-title">
          <div class="work-icon">
            <h2>Play</h2>
            <button class="button-icon">
              <img src="./images/icon-ellipsis.svg" alt="icon ellipsis" />
            </button>
          </div>
          <div class="work-hour">
            <h3>10hrs</h3>
            <p>Last week - 8hrs</p>
          </div>
        </header>
      </section>

      <section class="container-work study">
        <div class="icon-work">
          <img src="./images/icon-study.svg" alt="" />
        </div>
        <header class="container-work-title">
          <div class="work-icon">
            <h2>Study</h2>
            <button class="button-icon">
              <img src="./images/icon-ellipsis.svg" alt="icon ellipsis" />
            </button>
          </div>
          <div class="work-hour">
            <h3>4hrs</h3>
            <p>Last week - 7hrs</p>
          </div>
        </header>
      </section>

      <section class="container-work excercise">
        <div class="icon-work">
          <img src="./images/icon-exercise.svg" alt="" />
        </div>
        <header class="container-work-title">
          <div class="work-icon">
            <h2>Excercise</h2>
            <button class="button-icon">
              <img src="./images/icon-ellipsis.svg" alt="icon ellipsis" />
            </button>
          </div>
          <div class="work-hour">
            <h3>4hrs</h3>
            <p>Last week - 5hrs</p>
          </div>
        </header>
      </section>

      <section class="container-work social">
        <div class="icon-work">
          <img src="./images/icon-social.svg" alt="" />
        </div>
        <header class="container-work-title">
          <div class="work-icon">
            <h2>Social</h2>
            <button class="button-icon">
              <img src="./images/icon-ellipsis.svg" alt="icon ellipsis" />
            </button>
          </div>
          <div class="work-hour">
            <h3>5hrs</h3>
            <p>Last week - 10hrs</p>
          </div>
        </header>
      </section>

      <section class="container-work care">
        <div class="icon-work">
          <img src="./images/icon-self-care.svg" alt="" />
        </div>
        <header class="container-work-title">
          <div class="work-icon">
            <h2>Self Care</h2>
            <button class="button-icon">
              <img src="./images/icon-ellipsis.svg" alt="icon ellipsis" />
            </button>
          </div>
          <div class="work-hour">
            <h3>2hrs</h3>
            <p>Last week - 2hrs</p>
          </div>
        </header>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
